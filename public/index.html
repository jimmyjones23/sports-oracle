<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sports Oracle — AI Sports Analysis</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #13131a; --border: rgba(255,255,255,0.07);
      --text: #f0f0f5; --muted: rgba(255,255,255,0.4);
      --orange: #ff6b35; --green: #19c37d; --blue: #4285f4;
      --claude: #ff6b35; --chatgpt: #19c37d; --gemini: #4285f4;
    }
    body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; overflow-x:hidden; }
    .field-bg { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
    .field-bg::before { content:''; position:absolute; inset:0; background:linear-gradient(180deg,transparent 0%,rgba(255,107,53,0.03) 50%,transparent 100%),repeating-linear-gradient(90deg,transparent,transparent 80px,rgba(255,255,255,0.015) 80px,rgba(255,255,255,0.015) 81px); }
    .wrap { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:0 24px 100px; }
    header { padding:40px 0 32px; border-bottom:1px solid var(--border); margin-bottom:40px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; }
    .logo { font-family:'Bebas Neue',sans-serif; font-size:clamp(36px,6vw,56px); letter-spacing:2px; line-height:1; background:linear-gradient(135deg,#ff6b35,#ffd700); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .logo-sub { font-size:11px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-top:4px; }
    .model-pills { display:flex; gap:8px; flex-wrap:wrap; }
    .model-pill { display:flex; align-items:center; gap:6px; padding:5px 12px; border-radius:20px; font-size:11px; font-weight:600; border:1px solid; opacity:0.5; transition:opacity 0.3s; }
    .model-pill.active { opacity:1; }
    .model-pill .dot { width:6px; height:6px; border-radius:50%; }
    .model-pill[data-model="claude"] { border-color:var(--claude); color:var(--claude); }
    .model-pill[data-model="claude"] .dot { background:var(--claude); }
    .model-pill[data-model="gpt4"] { border-color:var(--chatgpt); color:var(--chatgpt); }
    .model-pill[data-model="gpt4"] .dot { background:var(--chatgpt); }
    .model-pill[data-model="gemini"] { border-color:var(--gemini); color:var(--gemini); }
    .model-pill[data-model="gemini"] .dot { background:var(--gemini); }
    .mode-tabs { display:flex; margin-bottom:32px; background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
    .mode-tab { flex:1; padding:16px 8px; text-align:center; cursor:pointer; border:none; background:none; color:var(--muted); font-family:'Inter',sans-serif; font-size:13px; font-weight:600; text-transform:uppercase; transition:all 0.2s; border-right:1px solid var(--border); position:relative; }
    .mode-tab:last-child { border-right:none; }
    .mode-tab.active { color:var(--text); background:rgba(255,107,53,0.1); }
    .mode-tab.active::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:var(--orange); }
    .mode-tab:hover:not(.active) { color:var(--text); background:rgba(255,255,255,0.03); }
    .mode-icon { font-size:18px; display:block; margin-bottom:4px; }
    .panel { display:none; animation:fadeUp 0.3s ease; }
    .panel.active { display:block; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .form-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:28px; margin-bottom:20px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
    @media(max-width:640px) { .form-row { grid-template-columns:1fr; } }
    .form-group { margin-bottom:16px; }
    label { display:block; font-size:10px; font-weight:700; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:8px; }
    input, select, textarea { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:var(--text); padding:11px 14px; font-family:'Inter',sans-serif; font-size:14px; outline:none; border-radius:6px; transition:border-color 0.2s,background 0.2s; appearance:none; }
    input:focus, select:focus, textarea:focus { border-color:rgba(255,107,53,0.5); background:rgba(255,255,255,0.07); }
    input::placeholder, textarea::placeholder { color:rgba(255,255,255,0.2); }
    select option { background:#1a1a2e; }
    textarea { resize:vertical; min-height:80px; }
    .sport-selector { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
    .sport-btn { padding:8px 16px; border-radius:6px; border:1px solid var(--border); background:none; color:var(--muted); font-family:'Inter',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; }
    .sport-btn.active { border-color:var(--orange); color:var(--orange); background:rgba(255,107,53,0.1); }
    .sport-btn:hover:not(.active) { border-color:rgba(255,255,255,0.2); color:var(--text); }
    .mode-toggle { display:flex; gap:8px; margin-bottom:20px; }
    .toggle-btn { padding:7px 18px; border-radius:20px; border:1px solid var(--border); background:none; color:var(--muted); font-family:'Inter',sans-serif; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.2s; }
    .toggle-btn.active { border-color:var(--orange); color:var(--orange); background:rgba(255,107,53,0.1); }
    .player-tags { display:flex; flex-wrap:wrap; gap:6px; min-height:44px; padding:8px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:6px; cursor:text; transition:border-color 0.2s; }
    .player-tags:focus-within { border-color:rgba(255,107,53,0.5); }
    .player-tag { display:flex; align-items:center; gap:6px; background:rgba(255,107,53,0.15); border:1px solid rgba(255,107,53,0.3); color:var(--orange); padding:3px 10px; border-radius:20px; font-size:12px; font-weight:600; white-space:nowrap; }
    .player-tag button { background:none; border:none; color:var(--orange); cursor:pointer; font-size:14px; padding:0; line-height:1; width:auto; }
    .tag-input { border:none; background:none; outline:none; color:var(--text); font-family:'Inter',sans-serif; font-size:13px; min-width:120px; flex:1; padding:2px 4px; }
    .tag-hint { font-size:11px; color:var(--muted); margin-top:4px; }
    .trade-grid { display:grid; grid-template-columns:1fr auto 1fr; gap:16px; align-items:start; margin-bottom:20px; }
    @media(max-width:640px) { .trade-grid { grid-template-columns:1fr; } }
    .trade-arrow { display:flex; align-items:center; justify-content:center; padding-top:28px; font-size:24px; color:var(--muted); }
    .trade-side-label { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:1px; margin-bottom:8px; }
    .trade-side-label.a { color:var(--orange); }
    .trade-side-label.b { color:var(--blue); }
    .submit-btn { background:linear-gradient(135deg,#ff6b35,#ff4500); color:#fff; border:none; padding:14px 32px; font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; cursor:pointer; border-radius:6px; transition:all 0.2s; width:100%; box-shadow:0 4px 20px rgba(255,107,53,0.3); }
    .submit-btn:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 6px 28px rgba(255,107,53,0.45); }
    .submit-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
    .section-label { font-size:10px; font-weight:700; letter-spacing:2.5px; color:var(--muted); text-transform:uppercase; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--border); }
    .error-banner { display:none; background:rgba(255,107,107,0.08); border:1px solid rgba(255,107,107,0.25); border-radius:6px; padding:12px 16px; color:#ff6b6b; font-size:13px; margin-bottom:16px; }
    .error-banner.active { display:block; }
    .progress-bar { display:none; margin-bottom:16px; }
    .progress-bar.active { display:block; }
    .progress-track { height:3px; background:rgba(255,255,255,0.06); border-radius:2px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,#ff6b35,#ffd700); width:0%; transition:width 0.5s ease; border-radius:2px; }
    .progress-label { font-size:11px; color:var(--muted); letter-spacing:1px; margin-bottom:6px; text-transform:uppercase; }
    #results-section { display:none; margin-top:32px; }
    #results-section.active { display:block; animation:fadeUp 0.4s ease; }
    .consensus-banner { background:linear-gradient(135deg,rgba(255,107,53,0.15),rgba(255,215,0,0.08)); border:1px solid rgba(255,107,53,0.3); border-radius:12px; padding:32px; margin-bottom:24px; text-align:center; position:relative; overflow:hidden; animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes popIn { from{opacity:0;transform:scale(0.92)} to{opacity:1;transform:scale(1)} }
    .consensus-banner::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 0%,rgba(255,107,53,0.1) 0%,transparent 70%); pointer-events:none; }
    .consensus-eyebrow { font-size:10px; font-weight:700; letter-spacing:3px; color:rgba(255,107,53,0.7); text-transform:uppercase; margin-bottom:12px; }
    .consensus-winner { font-family:'Bebas Neue',sans-serif; font-size:clamp(48px,8vw,80px); letter-spacing:3px; line-height:1; background:linear-gradient(135deg,#ff6b35,#ffd700); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:12px; }
    .consensus-verdict { font-size:16px; font-weight:600; color:rgba(255,255,255,0.85); max-width:600px; margin:0 auto 20px; line-height:1.5; }
    .consensus-votes { display:flex; justify-content:center; gap:12px; flex-wrap:wrap; }
    .vote-chip { display:flex; align-items:center; gap:6px; padding:6px 14px; border-radius:20px; font-size:12px; font-weight:700; border:1px solid; }
    .vote-chip.agree { background:rgba(25,195,125,0.1); border-color:rgba(25,195,125,0.3); color:#19c37d; }
    .vote-chip.disagree { background:rgba(255,107,107,0.1); border-color:rgba(255,107,107,0.3); color:#ff6b6b; }
    .results-header { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; margin-bottom:16px; color:var(--muted); }
    .results-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:16px; }
    .result-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; animation:fadeUp 0.4s ease; position:relative; }
    .result-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
    .result-card[data-model="claude"]::before { background:var(--claude); }
    .result-card[data-model="gpt4"]::before { background:var(--chatgpt); }
    .result-card[data-model="gemini"]::before { background:var(--gemini); }
    .result-card-header { padding:14px 18px 10px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .result-model-info { display:flex; align-items:center; gap:8px; }
    .result-model-dot { width:8px; height:8px; border-radius:50%; }
    .result-model-name { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
    .result-card[data-model="claude"] .result-model-name { color:var(--claude); }
    .result-card[data-model="gpt4"] .result-model-name { color:var(--chatgpt); }
    .result-card[data-model="gemini"] .result-model-name { color:var(--gemini); }
    .mini-verdict { font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:1px; }
    .mini-verdict.winner-a { color:var(--orange); }
    .mini-verdict.loading-v { color:var(--muted); animation:pulse 1.2s infinite; }
    .confidence-section { padding:10px 18px; border-bottom:1px solid var(--border); }
    .confidence-label { display:flex; justify-content:space-between; font-size:10px; font-weight:700; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; margin-bottom:6px; }
    .conf-track { height:6px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden; }
    .conf-fill { height:100%; border-radius:3px; transition:width 1s cubic-bezier(0.34,1.56,0.64,1); width:0%; }
    .conf-fill.high { background:linear-gradient(90deg,#19c37d,#00ff9d); }
    .conf-fill.medium { background:linear-gradient(90deg,#ffd700,#ffaa00); }
    .conf-fill.low { background:linear-gradient(90deg,#ff6b6b,#ff4500); }
    .result-body { padding:16px 18px; font-size:13px; line-height:1.8; color:rgba(255,255,255,0.7); }
    .result-body.error { color:#ff6b6b; }
    .result-body .loading { color:var(--muted); animation:pulse 1.2s infinite; letter-spacing:3px; font-size:18px; }
    @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
    .detail-row { margin-bottom:10px; }
    .detail-label { font-size:9px; font-weight:700; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:3px; }
    .detail-text { font-size:13px; color:rgba(255,255,255,0.75); line-height:1.6; }
    .detail-text.key { color:var(--orange); font-weight:600; }
    .detail-text.risk { color:#ff6b6b; }
    .detail-text.up { color:var(--green); }
    footer { margin-top:80px; padding-top:24px; border-top:1px solid var(--border); text-align:center; color:var(--muted); font-size:12px; }
  </style>
</head>
<body>
<div class="field-bg"></div>
<div class="wrap">
  <header>
    <div>
      <div class="logo">Sports Oracle</div>
      <div class="logo-sub">Multi-AI Sports Analysis Engine • March 2026</div>
    </div>
    <div class="model-pills" id="modelPills"></div>
  </header>

  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="trade" onclick="switchMode('trade')"><span class="mode-icon">🔄</span>Trade Analyzer</button>
    <button class="mode-tab" data-mode="draft" onclick="switchMode('draft')"><span class="mode-icon">🎯</span>Draft Advisor</button>
    <button class="mode-tab" data-mode="startsit" onclick="switchMode('startsit')"><span class="mode-icon">⚡</span>Start / Sit</button>
  </div>

  <div class="error-banner" id="errorBanner"></div>
  <div class="progress-bar" id="progressBar">
    <div class="progress-label" id="progressLabel">Consulting AI analysts...</div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:30%"></div></div>
  </div>

  <!-- TRADE PANEL -->
  <div class="panel active" id="panel-trade">
    <div class="form-card">
      <div class="section-label">Sport & Mode</div>
      <div class="sport-selector">
        <button class="sport-btn active" onclick="setSport('trade','NFL',this)">🏈 NFL</button>
        <button class="sport-btn" onclick="setSport('trade','NHL',this)">🏒 NHL</button>
        <button class="sport-btn" onclick="setSport('trade','NBA',this)">🏀 NBA</button>
        <button class="sport-btn" onclick="setSport('trade','MLB',this)">⚾ MLB</button>
      </div>
      <div class="mode-toggle">
        <button class="toggle-btn active" onclick="setMode('trade','real',this)">🏟 Real Life</button>
        <button class="toggle-btn" onclick="setMode('trade','fantasy',this)">🎮 Fantasy</button>
      </div>
      <div class="section-label">The Trade</div>
      <div class="trade-grid">
        <div>
          <div class="trade-side-label a">Team A Gives Up</div>
          <label>Team Name (optional)</label>
          <input type="text" id="trade-teamA" placeholder="e.g. Dallas Cowboys"/>
          <div style="margin-top:12px">
            <label>Players / Picks</label>
            <div class="player-tags" id="tags-A" onclick="focusTagInput('tagInput-A')">
              <input class="tag-input" id="tagInput-A" placeholder="Type name, press Enter..." onkeydown="handleTa
